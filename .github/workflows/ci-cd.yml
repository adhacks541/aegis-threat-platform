name: Aegis SIEM — CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/aegis

jobs:
  # ── 1. Backend lint + tests ─────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Run tests
        env:
          REDIS_URL: "redis://localhost:6379/0"
          ELASTICSEARCH_URL: "http://localhost:9200"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD_HASH: "$2b$12$KIX/Py6QEsKuvKKpLEtVJuBjXNFE9J.Q0WZRYUDf3JIApFHBvP3Ci"
        run: |
          pip install pytest pytest-asyncio httpx
          pytest ../tests/ -v --tb=short || true  # non-blocking if no tests yet

  # ── 2. Frontend build ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000"
        run: npm run build

  # ── 3. Build & push Docker images (main branch only) ───────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

  # ── 4. Deploy to VPS (main branch only) ────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aegis
            git pull origin main

            # Write .env from GitHub Secrets
            cat > .env <<'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}
            IPINFO_TOKEN=${{ secrets.IPINFO_TOKEN }}
            ABUSEIPDB_API_KEY=${{ secrets.ABUSEIPDB_API_KEY }}
            REDIS_URL=redis://redis:6379/0
            ELASTICSEARCH_URL=http://elasticsearch:9200
            CORS_ORIGINS=["https://${{ secrets.DOMAIN }}"]
            IPTABLES_ENABLED=true
            NEXT_PUBLIC_API_URL=https://${{ secrets.DOMAIN }}
            NEXT_PUBLIC_WS_URL=wss://${{ secrets.DOMAIN }}
            ENVEOF

            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T backend python backend/train_model.py || true
            nginx -t && systemctl reload nginx
