version: '3.8'

# Load secrets from .env (copy from .env.example)
# All services that need secrets reference this file.

services:
  # ── Infrastructure ──────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: siem-elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # Disable security for single-node dev (enable + configure certs for prod)
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - siem-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.13.0
    container_name: siem-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-network

  redis:
    image: redis:7.2-alpine
    container_name: siem-redis
    ports:
      - "6379:6379"
    networks:
      - siem-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Application ─────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: siem-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-network

  worker:
    build: ./backend
    container_name: siem-worker
    command: python -m app.worker
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - IPTABLES_ENABLED=${IPTABLES_ENABLED:-false}
    # NET_ADMIN capability lets the worker call iptables (Phase 4).
    # Only effective if IPTABLES_ENABLED=true in .env.
    cap_add:
      - NET_ADMIN
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - siem-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: siem-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    depends_on:
      - backend
    networks:
      - siem-network

volumes:
  es_data:

networks:
  siem-network:
    driver: bridge
