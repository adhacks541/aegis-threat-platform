# Nginx config for Aegis SIEM
# Place at /etc/nginx/sites-available/aegis and symlink to sites-enabled/
# Requires: certbot --nginx -d your-domain.com

upstream backend {
    server 127.0.0.1:8000;
}

upstream frontend {
    server 127.0.0.1:3000;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # Let certbot manage these paths:
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # ── Frontend (Next.js) ───────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── FastAPI REST API ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket live feed ──────────────────────────────────────────
    # Critical: must set Upgrade + Connection headers for WS to work.
    location /api/v1/ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # Keep WS alive for 1 hour
        proxy_send_timeout 3600s;
    }

    # ── FastAPI interactive docs ─────────────────────────────────────
    location /docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
    }
}
