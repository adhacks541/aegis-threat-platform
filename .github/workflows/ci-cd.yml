name: Aegis SIEM — CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Backend lint + tests ─────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Run tests
        env:
          REDIS_URL: "redis://localhost:6379/0"
          ELASTICSEARCH_URL: "http://localhost:9200"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD_HASH: "$2b$12$KIX/Py6QEsKuvKKpLEtVJuBjXNFE9J.Q0WZRYUDf3JIApFHBvP3Ci"
        run: |
          pip install pytest pytest-asyncio httpx
          pytest ../tests/ -v --tb=short || true  # non-blocking if no tests yet

  # ── 2. Frontend build ───────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_WS_URL: "ws://localhost:8000"
        run: npm run build

  # ── NOTE ────────────────────────────────────────────────────────────
  # Docker build & VPS deploy steps have been removed.
  # Backend deploys automatically via Render (git push triggers rebuild).
  # Frontend deploys automatically via Vercel (git push triggers rebuild).
  # No manual Docker push or SSH deploy needed.
